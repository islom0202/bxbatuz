name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set execute permission on gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Check JAR file
        run: ls -la build/libs

      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/${{ secrets.SERVER_USER }}/app"
          strip_components: 2

      - name: Run app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/${{ secrets.SERVER_USER }}/app"
            mkdir -p "$APP_DIR"

            sudo dnf install -y java-21-amazon-corretto-headless procps-ng

            java -version

            EXECUTABLE_JAR=$(ls "$APP_DIR"/*.jar | grep -v 'plain.jar' | head -n 1)
            if [ -z "$EXECUTABLE_JAR" ]; then
              echo "ERROR: No executable JAR file found. Aborting."
              exit 1
            fi
            echo "Found executable JAR: $EXECUTABLE_JAR"

            PID=$(ps -ef | grep "$EXECUTABLE_JAR" | grep -v grep | awk '{print $2}')
            if [ -n "$PID" ]; then
              echo "Stopping old process with PID: $PID"
              kill -15 "$PID"
              while ps -p "$PID" > /dev/null; do sleep 1; done
              echo "Process stopped."
            else
              echo "No old process found. Skipping."
            fi

            echo "Starting new application: $EXECUTABLE_JAR"
            nohup java -jar "$EXECUTABLE_JAR" > "$APP_DIR/app.log" 2>&1 &

            sleep 15

            echo "--- Displaying application log (app.log) ---"
            cat "$APP_DIR/app.log" || true

            echo "--- Checking for running Java process ---"
            ps aux | grep "[j]ava -jar" || (echo "ERROR: Java process not found!" && exit 1)

            echo "--- Checking application health on localhost:9091 ---"
            curl -f http://localhost:9091 || (echo "ERROR: Application not responding on port 9091. Check app.log for errors." && exit 1)
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}